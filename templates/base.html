<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Multimedia Library Search{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; margin: 0; background: #f5f6fa; color: #212529; }
        nav { background: #1a1a2e; padding: 0.75rem 1.5rem; display: flex; gap: 1.5rem; align-items: center; }
        nav a { color: #c9cfe0; text-decoration: none; font-size: 0.9rem; }
        nav a:hover { color: #fff; }
        .brand { color: #fff; font-weight: 600; font-size: 1rem; margin-right: auto; letter-spacing: .02em; }
        main { max-width: 900px; margin: 2rem auto; padding: 0 1.25rem; }
        .card { background: #fff; border-radius: 10px; padding: 1.5rem; box-shadow: 0 1px 6px rgba(0,0,0,.07); margin-bottom: 1.5rem; }
        h2 { margin: 0 0 0.75rem; font-size: 1.2rem; }
        h3 { margin: 0 0 0.75rem; font-size: 1rem; }
        button, .btn { cursor: pointer; padding: 0.5rem 1.2rem; border: none; border-radius: 6px; background: #4361ee; color: #fff; font-size: 0.9rem; }
        button:hover { background: #3451d1; }
        input[type=text], input[type=number] { padding: 0.5rem 0.75rem; border: 1px solid #ced4da; border-radius: 6px; font-size: 0.9rem; }
        .progress-wrap { background: #e9ecef; border-radius: 4px; height: 10px; overflow: hidden; margin: 0.5rem 0; }
        .progress-bar { height: 100%; background: #4361ee; transition: width 0.4s ease; }
        .hidden { display: none !important; }
        .muted { color: #6c757d; font-size: 0.875rem; }
    </style>
</head>
<body>
<nav>
    <span class="brand">Library Search</span>
    <a href="/">Index</a>
    <a href="/label">Label</a>
    <a href="/search">Search</a>
</nav>
<main>
    {% block content %}{% endblock %}
</main>
</body>
</html>
